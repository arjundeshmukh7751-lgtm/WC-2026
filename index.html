<!DOCTYPE html>
<html>

<head>
<title>World Cup 2026</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<nav>

<div class="logo">
⚽ World Cup 2026
</div>

<ul>

<li>
<a href="index.html">Home</a>
</li>

<li>
<a href="matches.html">Matches</a>
</li>

<li>
<a href="groups.html">Groups</a>
</li>

</ul>

</nav>

<div class="hero">

<h1>FIFA WORLD CUP 2026</h1>

<p>
48 Teams • 104 Matches • USA • Canada • Mexico
</p>

</div>

</header>

<section>

<div class="card">

<h2>Countdown</h2>

<div id="daysLeft"></div>

</div>

</section>

<section>

<div class="card">

<h2>Favourite Team</h2>

<select id="teamSelect">

<option>Argentina</option>
<option>Brazil</option>
<option>Germany</option>
<option>Mexico</option>
<option>USA</option>

</select>

<button onclick="saveTeam()">

Save

</button>

<p id="chosenTeam"></p>

</div>

</section>

<script>

const worldCupDate =
new Date("June 11, 2026");

function updateCountdown(){

const today =
new Date();

const diff =
worldCupDate - today;

const days =
Math.ceil(
diff/(1000*60*60*24)
);

document.getElementById(
"daysLeft"
).innerHTML =
days + " Days Remaining";

}

updateCountdown();

function saveTeam(){

const team =
document.getElementById(
"teamSelect"
).value;

localStorage.setItem(
"favoriteTeam",
team
);

document.getElementById(
"chosenTeam"
).innerHTML =
"Favourite Team: " +
team;

}

window.onload = function(){

const saved =
localStorage.getItem(
"favoriteTeam"
);

if(saved){

document.getElementById(
"chosenTeam"
).innerHTML =
"Favourite Team: " +
saved;

}

}

</script>

</body>
</html>
